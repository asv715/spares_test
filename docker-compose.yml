version: "3.8"

services:
  nginx:
    image: "nginx:stable-alpine"
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src:/var/www/laravel
    depends_on:
      - pgsql
      - php
      - redis
    container_name:
      nginx-spares

  php:
    build:
      context: docker
      dockerfile: Dockerfile
    volumes:
      - ./src:/var/www/laravel
    container_name:
      php-spares

  pgsql:
    image: 'postgres:16'
    ports:
      - '5432:5432'
    environment:
      PGPASSWORD: password
      POSTGRES_DB: spares
      POSTGRES_USER: spares
      POSTGRES_PASSWORD: password
    volumes:
      - pg_data:/var/lib/postgresql
    container_name:
      postgresql-spares

  redis:
    image: 'redis:alpine'
    ports:
      - '6379:6379'
    volumes:
      - pg_data:/data
    container_name:
      redis-spares

  composer:
    image: composer:latest
    working_dir: /var/www/laravel
    entrypoint: ["composer", "--ignore-platform-reqs"]
    volumes:
      - ./src:/var/www/laravel

  artisan:
    build:
      context: docker
      dockerfile: Dockerfile
    volumes:
      - ./src:/var/www/laravel
    entrypoint: ["php", "/var/www/laravel/artisan"]

volumes:
  pg_data: